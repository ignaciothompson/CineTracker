services:
  pocketbase:
    build: .
    container_name: cinetracker-pb
    restart: unless-stopped
    # Pass-through: toma ANTHROPIC_* del entorno de Dokploy o del .env local.
    # No uses ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} — si no interpola, pisa la var con "".
    environment:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL
    ports:
      # 5173 = app completa (Docker). Para dev con `npm run dev`, usá HOST_PORT=8092 en .env.
      - "${HOST_PORT:-5173}:8090"
    volumes:
      # Solo los datos persisten en un volumen; el código (hooks/migraciones)
      # va horneado en la imagen, así Dokploy no depende de que un volumen
      # vacío se llene solo.
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pb_data:
